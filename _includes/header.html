{% assign nav = site.data.navigation[page.lang] %}

<header class="site-header">
  <div class="container header-inner">
    <a class="logo" href="{{ '/' | relative_url }}">MB</a>

    <nav class="primary-nav" aria-label="Primary navigation">
      <ul>
        {% for item in nav.menu %}
          <li>
            <a href="{{ item.url | relative_url }}" {% if page.url == item.url %}aria-current="page"{% endif %}>
              {{ item.title }}
            </a>
          </li>
        {% endfor %}
      </ul>
    </nav>

    <div class="lang-switcher" aria-label="Language switcher">
      {% for l in nav.languages %}
        <a href="{{ l.url | relative_url }}" {% if l.code == page.lang %}aria-current="page"{% endif %}>
          {{ l.label }}
        </a>
      {% endfor %}
    </div>
  </div>
</header>
